<!DOCTYPE html>
<html>
<head>
<title>Route Path Editor</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: -apple-system, sans-serif; }
#map { width: 100vw; height: 100vh; }
#panel {
  position: fixed; top: 10px; right: 10px; background: white; padding: 16px;
  border-radius: 10px; font-size: 13px; z-index: 1000;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3); width: 340px; max-height: 94vh;
  display: flex; flex-direction: column;
}
#panel h3 { margin: 0 0 8px; font-size: 15px; }
.toolbar { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.toolbar button {
  padding: 7px 11px; cursor: pointer; border: 1px solid #ccc;
  border-radius: 5px; font-size: 12px; background: #f8f8f8;
}
.toolbar button:hover { background: #e8e8e8; }
.toolbar button.active { background: #2196F3; color: white; border-color: #2196F3; }
.toolbar button.danger { background: #f44336; color: white; border-color: #f44336; }
#pointList {
  flex: 1; overflow-y: auto; margin: 8px 0; border: 1px solid #ddd;
  border-radius: 6px; max-height: 45vh;
}
#pointList table { width: 100%; border-collapse: collapse; font-size: 11px; }
#pointList th { background: #f0f0f0; padding: 4px 6px; position: sticky; top: 0; text-align: left; }
#pointList td { padding: 3px 6px; border-top: 1px solid #eee; font-family: monospace; }
#pointList tr:hover { background: #e3f2fd; }
#pointList tr.selected { background: #bbdefb; }
#pointList .del-btn { cursor: pointer; color: #f44336; font-weight: bold; padding: 0 4px; }
#pointList .del-btn:hover { background: #f44336; color: white; border-radius: 3px; }
#output {
  margin-top: 8px; padding: 8px; background: #f5f5f5; border-radius: 5px;
  font-family: monospace; font-size: 9px; white-space: pre-wrap;
  max-height: 160px; overflow-y: auto; word-break: break-all;
}
.info { color: #888; font-size: 11px; margin: 2px 0; }
.coord-display {
  position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.8); color: #0f0; padding: 6px 14px;
  border-radius: 6px; font-family: monospace; font-size: 13px; z-index: 1000;
}
</style>
</head>
<body>
<div id="map"></div>
<div class="coord-display" id="coordDisplay">Move mouse over map</div>
<div id="panel">
  <h3>Route Path Editor</h3>
  <p class="info"><b>Click map</b> to add points. Drag markers to move. Toggle legs below.</p>
  <div class="toolbar">
    <button onclick="toggleLayer()">🗺️ Satellite</button>
    <button onclick="toggleDraw()" id="drawBtn">✏️ Draw Mode</button>
    <button onclick="clearAll()" class="danger">🗑️ Clear All</button>
    <button onclick="undoLast()">↩ Undo</button>
    <button onclick="exportCoords()">📋 Export</button>
    <button onclick="loadLeg(1)" style="background:#ED1C24;color:white;border-color:#ED1C24">Load Leg 1</button>
  </div>
  <div class="toolbar" id="legToggles">
    <button onclick="toggleLeg(0)" id="legBtn0" class="active" style="background:#ED1C24;color:white;border-color:#ED1C24">Leg 1</button>
    <button onclick="toggleLeg(1)" id="legBtn1" class="active" style="background:#FFC20E;color:#333;border-color:#FFC20E">Leg 2</button>
    <button onclick="toggleLeg(2)" id="legBtn2" class="active" style="background:#39B54A;color:white;border-color:#39B54A">Leg 3</button>
    <button onclick="toggleLeg(3)" id="legBtn3" class="active" style="background:#92278F;color:white;border-color:#92278F">Leg 4</button>
    <button onclick="toggleLeg(4)" id="legBtn4" class="active" style="background:white;color:#333;border-color:#ccc">Traces</button>
  </div>
  <div id="pointList">
    <table>
      <thead><tr><th>#</th><th>Lat</th><th>Lng</th><th></th></tr></thead>
      <tbody id="pointBody"></tbody>
    </table>
  </div>
  <div id="output">Click Export to get coordinate array.</div>
</div>

const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: 'Esri', maxZoom: 19
});
const dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: 'CARTO', subdomains: 'abcd', maxZoom: 20
}).addTo(map);
let isSat = false;
function toggleLayer() {
  if (isSat) { map.removeLayer(satellite); dark.addTo(map); }
  else { map.removeLayer(dark); satellite.addTo(map); }
  isSat = !isSat;
}

// Show coordinates on mouse move
map.on('mousemove', function(e) {
  document.getElementById('coordDisplay').textContent =
    `${e.latlng.lat.toFixed(6)}, ${e.latlng.lng.toFixed(6)}`;
});

// All points
let points = [];
let markers = [];
let polyline = null;
let drawMode = true; // start in draw mode

function toggleDraw() {
  drawMode = !drawMode;
  document.getElementById('drawBtn').classList.toggle('active', drawMode);
  map.getContainer().style.cursor = drawMode ? 'crosshair' : '';
}
// Start with draw mode active
document.getElementById('drawBtn').classList.add('active');
map.getContainer().style.cursor = 'crosshair';

// Click map to add point
map.on('click', function(e) {
  if (!drawMode) return;
  points.push([e.latlng.lat, e.latlng.lng]);
  redraw();
});

function redraw() {
  // Clear old markers
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  if (polyline) map.removeLayer(polyline);

  // Draw polyline
  if (points.length > 1) {
    polyline = L.polyline(points, {color: '#ff2222', weight: 4, opacity: 0.9}).addTo(map);
  }

  // Draw markers
  points.forEach((coord, i) => {
    const icon = L.divIcon({
      className: '',
      html: `<div style="
        width:20px; height:20px; background:#ff2222; border:2px solid white;
        border-radius:50%; cursor:grab; display:flex; align-items:center;
        justify-content:center; font-size:9px; font-weight:bold; color:white;
        box-shadow: 0 2px 6px rgba(0,0,0,0.5); line-height:20px;
      ">${i}</div>`,
      iconSize: [20, 20],
      iconAnchor: [10, 10],
    });

    const marker = L.marker(coord, { draggable: true, icon }).addTo(map);
    marker.on('dragend', function(e) {
      const pos = e.target.getLatLng();
      points[i] = [pos.lat, pos.lng];
      redraw();
    });
    markers.push(marker);
  });

  // Update point list table
  const tbody = document.getElementById('pointBody');
  tbody.innerHTML = points.map((p, i) =>
    `<tr onclick="panTo(${i})">
      <td>${i}</td>
      <td>${p[0].toFixed(6)}</td>
      <td>${p[1].toFixed(6)}</td>
      <td><span class="del-btn" onclick="event.stopPropagation(); delPoint(${i})">✕</span></td>
    </tr>`
  ).join('');
}

function delPoint(i) {
  points.splice(i, 1);
  redraw();
}

function panTo(i) {
  if (points[i]) map.panTo(points[i]);
}

function clearAll() {
  if (points.length === 0 || confirm('Clear all points?')) {
    points = [];
    redraw();
  }
}

function undoLast() {
  points.pop();
  redraw();
}

function exportCoords() {
  if (points.length === 0) {
    document.getElementById('output').textContent = 'No points to export.';
    return;
  }
  const lines = points.map(p => `  [${p[0].toFixed(6)}, ${p[1].toFixed(6)}],`).join('\n');
  const code = `[\n${lines}\n]`;
  document.getElementById('output').textContent = code;
  navigator.clipboard.writeText(code).then(() => {
    document.getElementById('output').textContent += '\n\n✅ Copied to clipboard!';
  }).catch(() => {});
}

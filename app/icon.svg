<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="25%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#4ECDC4"/>
      <stop offset="75%" style="stop-color:#45B7D1"/>
      <stop offset="100%" style="stop-color:#96CEB4"/>
    </linearGradient>
  </defs>
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Runner silhouette -->
  <g transform="translate(256,256) scale(0.85)" fill="white">
    <!-- Head -->
    <circle cx="30" cy="-120" r="32"/>
    <!-- Body -->
    <path d="M20,-85 L-10,10 Q-15,25 -5,30 L15,20 L20,-85Z" stroke="white" stroke-width="8" fill="white"/>
    <!-- Front leg (extended) -->
    <path d="M-5,10 L-70,80 L-90,75 Q-95,73 -92,68 L-60,50 L0,0Z" stroke="white" stroke-width="6" fill="white"/>
    <!-- Back leg (kicked back) -->
    <path d="M5,15 L70,60 L95,40 Q100,37 96,33 L65,35 L10,5Z" stroke="white" stroke-width="6" fill="white"/>
    <!-- Front arm (pumping forward) -->
    <path d="M15,-70 L-50,-40 L-65,-55 Q-68,-60 -62,-62 L-40,-50 L10,-75Z" stroke="white" stroke-width="6" fill="white"/>
    <!-- Back arm -->
    <path d="M25,-65 L65,-90 L80,-80 Q84,-77 80,-73 L60,-75 L20,-60Z" stroke="white" stroke-width="6" fill="white"/>
  </g>
  <!-- Color splashes -->
  <circle cx="100" cy="380" r="25" fill="#FF6B35" opacity="0.8"/>
  <circle cx="400" cy="130" r="20" fill="#FFD700" opacity="0.8"/>
  <circle cx="130" cy="120" r="18" fill="#96CEB4" opacity="0.8"/>
  <circle cx="390" cy="400" r="22" fill="#45B7D1" opacity="0.8"/>
</svg>
